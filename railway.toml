[build]
builder = "NIXPACKS"
# No DB access during build — do not migrate here.
buildCommand = "true"

[deploy]
# Migrate at start so private Postgres hostname resolves.
startCommand = "python manage.py migrate && python manage.py collectstatic --noinput && gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 3 --timeout 60"
preDeployCommand = []
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
