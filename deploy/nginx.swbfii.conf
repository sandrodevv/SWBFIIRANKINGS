# Example Nginx site for Hetzner VPS.
# Place at /etc/nginx/sites-available/swbfii and symlink into sites-enabled.
# Point server_name at your domain, then enable HTTPS with certbot.

upstream swbfii_app {
    server 127.0.0.1:8000;
}

server {
    listen 80;
    server_name example.com www.example.com;

    client_max_body_size 10M;

    location /static/ {
        alias /var/www/swbfii/staticfiles/;
        expires 7d;
        add_header Cache-Control "public";
    }

    location /media/ {
        alias /var/www/swbfii/media/;
        expires 7d;
        add_header Cache-Control "public";
    }

    location / {
        proxy_pass http://swbfii_app;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }
}
